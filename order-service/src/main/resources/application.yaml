spring:
  datasource:
    url: jdbc:mysql://localhost:3306/order_db?createDatabaseIfNotExist=true
    username: root
    password: 123456

  application:
    name: order-service

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

server:
  port: 8080
  error:
    include-message: always

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka