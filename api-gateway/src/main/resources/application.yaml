server:
  port: ${SERVER_PORT:8085}

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5500"
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            exposedHeaders:
              - "X-RateLimit-Limit"
              - "X-RateLimit-Remaining"
            allowCredentials: true

      routes:
        - id: order-service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/api/orders/**

        - id: inventory-service
          uri: lb://INVENTORY-SERVICE
          predicates:
            - Path=/api/inventory/**

        - id: user-service-users
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/users/**

        - id: user-service-auth
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/auth/**

        - id: user-service-admin
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/admin/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}

security:
  jwt:
    secret: ${SECURITY_JWT_SECRET:microshield-demo-secret-key-2026-change-me}
  rate-limit:
    login:
      enabled: ${LOGIN_RATE_LIMIT_ENABLED:true}
      max-requests: ${LOGIN_RATE_LIMIT_MAX_REQUESTS:10}
      window-seconds: ${LOGIN_RATE_LIMIT_WINDOW_SECONDS:60}
