server:
  port: ${SERVER_PORT:8081}
  error:
    include-message: always

spring:
  application:
    name: inventory-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/inventory_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: ${JPA_SHOW_SQL:false}

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:microshield}
    password: ${SPRING_RABBITMQ_PASSWORD:microshield123}
    listener:
      simple:
        default-requeue-rejected: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}

microshield:
  rabbit:
    order-exchange: microshield.order.exchange
    inventory-queue: microshield.inventory.order-created
    order-routing-key: order.created
