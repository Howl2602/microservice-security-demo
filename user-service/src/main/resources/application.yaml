server:
  port: ${SERVER_PORT:8082}
  error:
    include-message: always

spring:
  application:
    name: user-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/user_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: ${JPA_SHOW_SQL:false}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}

security:
  jwt:
    secret: ${SECURITY_JWT_SECRET:microshield-demo-secret-key-2026-change-me}
    expiration-ms: ${SECURITY_JWT_EXPIRATION_MS:86400000}
