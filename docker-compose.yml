name: microshield

services:
  user-db:
    image: mysql:8.4
    container_name: microshield-user-db
    environment:
      MYSQL_DATABASE: user_db
      MYSQL_USER: microshield
      MYSQL_PASSWORD: microshield123
      MYSQL_ROOT_PASSWORD: root123456
    ports:
      - "3307:3306"
    volumes:
      - user-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot123456"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks: [microshield-net]

  order-db:
    image: mysql:8.4
    container_name: microshield-order-db
    environment:
      MYSQL_DATABASE: order_db
      MYSQL_USER: microshield
      MYSQL_PASSWORD: microshield123
      MYSQL_ROOT_PASSWORD: root123456
    ports:
      - "3308:3306"
    volumes:
      - order-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot123456"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks: [microshield-net]

  inventory-db:
    image: mysql:8.4
    container_name: microshield-inventory-db
    environment:
      MYSQL_DATABASE: inventory_db
      MYSQL_USER: microshield
      MYSQL_PASSWORD: microshield123
      MYSQL_ROOT_PASSWORD: root123456
    ports:
      - "3309:3306"
    volumes:
      - inventory-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot123456"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks: [microshield-net]

  rabbitmq:
    image: rabbitmq:3-management
    container_name: microshield-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: microshield
      RABBITMQ_DEFAULT_PASS: microshield123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks: [microshield-net]

  discovery-service:
    build: ./discovery-service
    container_name: microshield-discovery
    environment:
      SERVER_PORT: 8761
    ports:
      - "8761:8761"
    restart: on-failure
    networks: [microshield-net]

  user-service:
    build: ./user-service
    container_name: microshield-user-service
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:mysql://user-db:3306/user_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: microshield
      SPRING_DATASOURCE_PASSWORD: microshield123
      EUREKA_DEFAULT_ZONE: http://discovery-service:8761/eureka
      SECURITY_JWT_SECRET: microshield-demo-secret-key-2026-change-me
    ports:
      - "8082:8082"
    depends_on:
      user-db:
        condition: service_healthy
      discovery-service:
        condition: service_started
    restart: on-failure
    networks: [microshield-net]

  inventory-service:
    build: ./inventory-service
    container_name: microshield-inventory-service
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:mysql://inventory-db:3306/inventory_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: microshield
      SPRING_DATASOURCE_PASSWORD: microshield123
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: microshield
      SPRING_RABBITMQ_PASSWORD: microshield123
      EUREKA_DEFAULT_ZONE: http://discovery-service:8761/eureka
    ports:
      - "8081:8081"
    depends_on:
      inventory-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      discovery-service:
        condition: service_started
    restart: on-failure
    networks: [microshield-net]

  order-service:
    build: ./order-service
    container_name: microshield-order-service
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mysql://order-db:3306/order_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: microshield
      SPRING_DATASOURCE_PASSWORD: microshield123
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: microshield
      SPRING_RABBITMQ_PASSWORD: microshield123
      EUREKA_DEFAULT_ZONE: http://discovery-service:8761/eureka
      DEMO_BOLA_ENABLED: "true"
    ports:
      - "8080:8080"
    depends_on:
      order-db:
        condition: service_healthy
      inventory-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      discovery-service:
        condition: service_started
    restart: on-failure
    networks: [microshield-net]

  api-gateway:
    build: ./api-gateway
    container_name: microshield-api-gateway
    environment:
      SERVER_PORT: 8085
      EUREKA_DEFAULT_ZONE: http://discovery-service:8761/eureka
      SECURITY_JWT_SECRET: microshield-demo-secret-key-2026-change-me
      LOGIN_RATE_LIMIT_ENABLED: "true"
      LOGIN_RATE_LIMIT_MAX_REQUESTS: 10
      LOGIN_RATE_LIMIT_WINDOW_SECONDS: 60
    ports:
      - "8085:8085"
    depends_on:
      discovery-service:
        condition: service_started
      user-service:
        condition: service_started
      order-service:
        condition: service_started
      inventory-service:
        condition: service_started
    restart: on-failure
    networks: [microshield-net]

  frontend:
    build: ./frontend
    container_name: microshield-frontend
    ports:
      - "3000:80"
    depends_on:
      api-gateway:
        condition: service_started
    restart: unless-stopped
    networks: [microshield-net]

networks:
  microshield-net:
    driver: bridge

volumes:
  user-db-data:
  order-db-data:
  inventory-db-data:
  rabbitmq-data:
